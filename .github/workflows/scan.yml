name: Security Scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: Arthit3108/ai-code-scanner@v1.0.6   
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          severity: HIGH,CRITICAL
          fail_on_critical: 'true'